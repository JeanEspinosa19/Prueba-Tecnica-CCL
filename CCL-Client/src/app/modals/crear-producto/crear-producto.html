<el-dialog>
  <dialog
    id="addProducto"
    aria-labelledby="dialog-title"
    class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent"
  >
    <!-- Backdrop -->
    <el-dialog-backdrop
      class="fixed inset-0 bg-gray-900/50 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"
    >
    </el-dialog-backdrop>

    <!-- Panel -->
    <div
      tabindex="0"
      class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0"
    >
      <el-dialog-panel
        class="relative transform overflow-hidden rounded-lg bg-gray-800 text-left shadow-xl outline -outline-offset-1 outline-white/10 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0 data-closed:sm:scale-95"
      >
        <!-- Header -->
        <div class="bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <h3 id="dialog-title" class="text-base font-semibold text-white mb-4">Crear Producto</h3>

          <!-- Form -->
          <form
            (ngSubmit)="guardarCambios()"
            [formGroup]="form"
            class="space-y-4"
            id="crearProducto"
          >
            <div>
              <label for="nombre" class="block text-sm font-medium text-gray-200 mb-1"
                >Nombre Producto</label
              >
              <input
                type="text"
                id="nombre"
                name="nombre"
                formControlName="nombre"
                class="w-full rounded-md border border-gray-600 bg-gray-700 px-3 py-2 text-white placeholder-gray-400 focus:border-red-500 focus:ring focus:ring-red-500/30"
                placeholder="Nombre del producto"
                required
              />
            </div>

            <div>
              <label for="precio" class="block text-sm font-medium text-gray-200 mb-1"
                >Cantidad</label
              >
              <input
                type="number"
                id="cantidad"
                name="cantidad"
                min="0"
                formControlName="cantidad"
                class="w-full rounded-md border border-gray-600 bg-gray-700 px-3 py-2 text-white placeholder-gray-400 focus:border-red-500 focus:ring focus:ring-red-500/30"
                placeholder="Cantidad"
                required
              />
            </div>
          </form>
        </div>

        <div class="px-4">
          <app-mostrar-errores [errores]="errores" />
        </div>
        

        <!-- Buttons -->
        <div class="bg-gray-700/25 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
          <button
            type="submit"
            form="crearProducto"
            class="cursor-pointer inline-flex w-full justify-center rounded-md bg-red-500 px-3 py-2 text-sm font-semibold text-white hover:bg-red-400 sm:ml-3 sm:w-auto"
          >
            Guardar Cambios
          </button>
          <button
            type="button"
            command="close"
            commandfor="addProducto"
            class="cursor-pointer mt-3 inline-flex w-full justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white inset-ring inset-ring-white/5 hover:bg-white/20 sm:mt-0 sm:w-auto"
          >
            Cancelar
          </button>
        </div>
      </el-dialog-panel>
    </div>
  </dialog>
</el-dialog>
