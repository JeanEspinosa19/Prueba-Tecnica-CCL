<nav
  class="relative bg-gradient-to-r from-amber-400 to-red-600 fixed w-full z-20 top-0 start-0 border-b border-default "
>
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a routerLink="/" class="flex text-white items-center space-x-3 rtl:space-x-reverse">
      <mat-icon>inventory</mat-icon>
      <span class="self-center text-xl text-heading font-semibold whitespace-nowrap"
        >CCL - Sistema de Inventario</span
      >
    </a>
    <button
      data-collapse-toggle="navbar-default"
      type="button"
      class="cursor-pointer inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
      aria-controls="navbar-default"
      aria-expanded="false"
    >
      <span class="sr-only">Menu de Opciones</span>
      <svg
        class="w-6 h-6 text-white"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        viewBox="0 0 24 24"
      >
        <path
          stroke="currentColor"
          stroke-linecap="round"
          stroke-width="2"
          d="M5 7h14M5 12h14M5 17h14"
        />
      </svg>
    </button>
    <div class="hidden w-full md:block md:w-auto" id="navbar-default">
      <ul
        class="font-medium flex flex-col items-center md:items-stretch p-4 md:p-0 mt-4 border border-none rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary text-center"
      >
        <li>
          <a
            routerLink="/"
            routerLinkActive="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-2 py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:border-0 md:p-0 hover:bg-red-600"
          >
            <mat-icon>home</mat-icon>Inicio
          </a>
        </li>

        <div action="" class="flex">
          @if (!isLogged) {
            <li>
              <button
                routerLink="login"
                routerLinkActive="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
                class="flex items-center cursor-pointer gap-2 py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:border-0 md:p-0 hover:bg-red-600"
              >
                <mat-icon>account_circle</mat-icon>Iniciar Sesión
              </button>
            </li>
          } @else {
            <li>
              <button
                routerLink="#"
                routerLinkActive="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
                class="flex items-center cursor-pointer gap-2 py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:border-0 md:p-0 hover:bg-red-600"
                (click)="logOut()"
              >
                <mat-icon>logout</mat-icon>Cerrar Sesión
              </button>
            </li>
          }
        </div>
      </ul>
    </div>
  </div>
</nav>
