<div class="flex justify-center items-center min-h-[80vh] px-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl">

    <!-- Tabs -->
    <div class="border-b">
      <ul class="flex">
        <li class="flex-1 text-center cursor-none">
          <a
            routerLink="/login"
            routerLinkActive="border-b-2 border-blue-500 text-blue-500"
            
            class="block py-3 font-medium text-gray-600 hover:text-blue-500 transition cursor-default"
          >
            Iniciar Sesión
          </a>
        </li>
      </ul>
    </div>

    <!-- Body -->
    <div class="p-6">
      <form (ngSubmit)="onLogin()" [formGroup]="form" id="login" class="space-y-4">

        <!-- Usuario -->
        <div>
          <label for="Usuario" class="block text-sm font-medium text-gray-700 mb-1">
            Usuario
          </label>
          <input
            type="text"
            name="Usuario"
            id="Usuario"
            autocomplete="off"
            required
            formControlName="Usuario"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="Pass" class="block text-sm font-medium text-gray-700 mb-1">
            Contraseña
          </label>
          <input
            type="password"
            name="Pass"
            id="Pass"
            required
            formControlName="Pass"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="px-4 py-2">
          <app-mostrar-errores [errores]="errores" />
        </div>

        <!-- Button -->
        <div>
          <button
            type="submit"
            form="login"
            class="w-full border border-green-500 text-green-500 py-2 rounded-lg hover:bg-green-500 hover:text-white transition disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
          >
            <i class="fas fa-sign-in-alt mr-2"></i> Ingresar
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
